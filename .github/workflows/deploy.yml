name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sii-api:latest ./node

      - name: Export and compress image
        run: docker save sii-api:latest | gzip -1 > /tmp/sii-api.tar.gz && ls -lh /tmp/sii-api.tar.gz

      - name: Transfer image to VPS via rsync
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -az --partial --progress \
            -e "ssh -p ${{ secrets.VPS_PORT }} -i /tmp/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -o ServerAliveCountMax=40" \
            /tmp/sii-api.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/sii-api.tar.gz
          rm -f /tmp/deploy_key

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            docker load < /tmp/sii-api.tar.gz
            rm -f /tmp/sii-api.tar.gz
            mkdir -p /var/www/sii/node/download
            cat > /var/www/sii/node/docker-compose.yml << 'EOF'
            services:
              api:
                image: sii-api:latest
                container_name: sii-api
                restart: unless-stopped
                ports:
                  - "127.0.0.1:3000:3000"
                env_file:
                  - .env
                volumes:
                  - ./download:/app/download
            EOF
            cd /var/www/sii/node
            docker compose up -d --remove-orphans
            docker image prune -f
