name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./node
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sii-api:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sii-api:latest
            mkdir -p /var/www/sii/node/download
            cat > /var/www/sii/node/docker-compose.yml << 'EOF'
            services:
              api:
                image: abarrenaprisma/sii-api:latest
                container_name: sii-api
                restart: unless-stopped
                ports:
                  - "127.0.0.1:3000:3000"
                env_file:
                  - .env
                volumes:
                  - ./download:/app/download
            EOF
            cd /var/www/sii/node
            docker compose up -d --remove-orphans
            docker image prune -f
